{% extends 'base.html' %}

{% block title %}Signup | Bakery Delight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-5 border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4" style="color: var(--bakery-primary);">Create an Account</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="username" required placeholder="Choose a unique username">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" id="email" required placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" required placeholder="Create a strong password">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" id="confirm_password" required placeholder="Repeat your password">
                    </div>
                    <div class="mb-4">
                        <label class="form-label d-block text-muted fw-bold">Select Role</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="roleCustomer" value="Customer" checked>
                            <label class="form-check-label" for="roleCustomer">Customer</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="roleBaker" value="Baker">
                            <label class="form-check-label" for="roleBaker">Baker</label>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary p-2 fs-5" style="background-color: var(--bakery-accent); border: none;">Sign Up</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Already have an account? <a href="{% url 'login' %}" style="color: var(--bakery-primary); font-weight: bold; text-decoration: none;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
