{% extends 'base.html' %}

{% block title %}Login | Bakery Delight{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-5 border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4" style="color: var(--bakery-primary);">Welcome Back!</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="username" required placeholder="Enter your username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" required placeholder="Enter your password">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary p-2 fs-5" style="background-color: var(--bakery-accent); border: none;">Login</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Don't have an account? <a href="{% url 'signup' %}" style="color: var(--bakery-primary); font-weight: bold; text-decoration: none;">Signup here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
