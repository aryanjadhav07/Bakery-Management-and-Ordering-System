{% extends 'base.html' %}

{% block title %}Courses{% endblock %}

{% block content %}
    <h1>Our Courses</h1>
    {% for course in courses %}
        <div class="card">
            <h3><a href="{% url 'course_detail' course.pk %}">{{ course.title }}</a></h3>
            <p>{{ course.description }}</p>
        </div>
    {% endfor %}
{% endblock %}
