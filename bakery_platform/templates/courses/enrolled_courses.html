{% extends 'base.html' %}

{% block title %}Your Enrolled Courses{% endblock %}

{% block content %}
    <h1>Your Enrolled Courses</h1>
    {% for enrollment in enrollments %}
        <div class="card">
            <h3>{{ enrollment.course.title }}</h3>
            <p>{{ enrollment.course.description }}</p>
        </div>
    {% endfor %}
{% endblock %}
