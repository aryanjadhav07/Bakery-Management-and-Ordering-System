{% extends 'base.html' %}

{% block title %}Order #{{ order.id }}{% endblock %}

{% block content %}
    <h1>Order #{{ order.id }}</h1>
    <p>Total: ${{ order.total_price }}</p>
    <h3>Items:</h3>
    <ul>
        {% for item in order.orderitem_set.all %}
            <li>{{ item.quantity }} x {{ item.product.name }}</li>
        {% endfor %}
    </ul>
{% endblock %}
