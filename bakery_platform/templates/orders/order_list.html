{% extends 'base.html' %}

{% block title %}Your Orders{% endblock %}

{% block content %}
    <h1>Your Orders</h1>
    {% for order in orders %}
        <div class="card">
            <h3><a href="{% url 'order_detail' order.pk %}">Order #{{ order.id }}</a></h3>
            <p>Total: ${{ order.total_price }}</p>
        </div>
    {% endfor %}
{% endblock %}
